site_name: TSN-Affinity
site_description: Training-Aware Sparse Networks with Affinity Routing for Continual Offline RL
site_url: https://sachn-cs.github.io/tsn-affinity/
repo_url: https://github.com/sachn-cs/tsn-affinity
repo_name: sachn-cs/tsn-affinity
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - API Reference: api.md
  - Deployment: deployment.md
  - FAQ: faq.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [".."]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 3
            members_order: source
            docstring_style: google

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sachn-cs/tsn-affinity

copyright: Copyright &copy; 2026 sachin-cs. Licensed under MIT.
